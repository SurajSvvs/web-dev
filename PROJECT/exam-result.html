<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .result-container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 4rem 2rem;
            text-align: center;
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.1);
            border: 4px solid #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem auto;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .score-circle h1 {
            font-size: 3rem;
            color: #38bdf8;
            line-height: 1;
        }
        
        .score-circle p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .result-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #f8fafc;
        }

        .result-desc {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-review {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            transition: all 0.3s;
        }

        .btn-review:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.6);
        }

    </style>
</head>
<body class="student-theme">

    <div class="result-container">
        <div class="score-circle" id="score-display">
            <h1><i class="fa-solid fa-spinner fa-spin"></i></h1>
        </div>

        <h2 class="result-title">Exam Completed Successfully!</h2>
        <p class="result-desc">Your responses for the Basic Mathematics Exam have been recorded. A detailed review will be available soon.</p>

        <div class="action-buttons">
            <a href="student-dashboard.html" class="btn-home"><i class="fa-solid fa-house"></i> Go to Dashboard</a>
        </div>
    </div>

    <script>
        // Retrieve score calculated from the previous page
        document.addEventListener('DOMContentLoaded', () => {
            const score = localStorage.getItem('lastExamScore') || '100';
            const scoreDisplay = document.getElementById('score-display');
            
            setTimeout(() => {
                scoreDisplay.innerHTML = `
                    <h1>${score}%</h1>
                    <p>Score</p>
                `;
            }, 1000);
        });
    </script>
</body>
</html>
