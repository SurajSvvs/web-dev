<!DOCTYPE current HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal Gateway</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>Secure Exam Portal</h1>
        <p>Select your portal to continue</p>
    </header>

    <div class="role-container">
        <!-- Student Card -->
        <a href="student-login.html" class="role-card student">
            <div class="role-icon">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <h2>Student</h2>
            <p>Access your dashboard to take exams, view results, and check upcoming schedules.</p>
        </a>

        <!-- Teacher Card -->
        <a href="teacher-login.html" class="role-card teacher">
            <div class="role-icon">
                <i class="fa-solid fa-chalkboard-user"></i>
            </div>
            <h2>Teacher</h2>
            <p>Log in to create exams, monitor student progress, and evaluate submissions effectively.</p>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
