<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Exam Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container student-theme">
        <div class="login-header">
            <h2>Student Login</h2>
            <p>Enter your credentials to access exams</p>
        </div>

        <form id="student-form" onsubmit="event.preventDefault(); animateLogin(this, 'student');">
            <div class="input-group">
                <label for="roll">Roll Number / Registration ID</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="roll" required placeholder="e.g. 12ABC3456" pattern="[0-9]{2}[A-Z]{3}[0-9]{4}" title="2 numbers, 3 capital letters, 4 numbers (e.g., 12ABC3456)">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
            </div>

            <button type="submit" class="btn-submit">Sign In <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i></button>

            <div class="extra-links">
                <a href="#">Forgot password?</a>
                <a href="#">Need help?</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
