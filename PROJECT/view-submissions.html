<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submissions | Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .table-container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2.5rem;
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .table-header h2 {
            color: #f43f5e;
        }
        
        .filter-controls select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        table th {
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .action-btn {
            background: transparent;
            color: #38bdf8;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.3s;
        }

        .action-btn:hover {
            color: #f8fafc;
        }
    </style>
</head>
<body class="teacher-theme">

    <a href="teacher-dashboard.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
    </a>

    <div class="table-container">
        <div class="table-header">
            <h2><i class="fa-solid fa-users-viewfinder"></i> Student Submissions</h2>
            <div class="filter-controls">
                <select>
                    <option>Basic Mathematics Exam</option>
                    <option>Physics Midterm</option>
                    <option>Computer Science 101</option>
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Registration No.</th>
                    <th>Student Name</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>12ABC3456</td>
                    <td>Alice Johnson</td>
                    <td>90 / 100</td>
                    <td><span class="status completed">Graded</span></td>
                    <td><button class="action-btn"><i class="fa-solid fa-eye"></i> View</button></td>
                </tr>
                <tr>
                    <td>34XYZ7890</td>
                    <td>Bob Smith</td>
                    <td>75 / 100</td>
                    <td><span class="status completed">Graded</span></td>
                    <td><button class="action-btn"><i class="fa-solid fa-eye"></i> View</button></td>
                </tr>
                <tr>
                    <td>56DEF1234</td>
                    <td>Charlie Davis</td>
                    <td>-</td>
                    <td><span class="status pending">Evaluating</span></td>
                    <td><button class="action-btn"><i class="fa-solid fa-pen"></i> Review</button></td>
                </tr>
                <tr>
                    <td>78GHI5678</td>
                    <td>Diana Prince</td>
                    <td>100 / 100</td>
                    <td><span class="status completed">Graded</span></td>
                    <td><button class="action-btn"><i class="fa-solid fa-eye"></i> View</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
